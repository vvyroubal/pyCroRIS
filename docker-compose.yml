services:

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - authelia
      - marimo
    restart: unless-stopped

  authelia:
    image: authelia/authelia:4
    volumes:
      - ./docker/authelia:/config
    env_file:
      - .env.docker
    environment:
      TZ: Europe/Zagreb
    restart: unless-stopped

  marimo:
    build: .
    env_file:
      - .env
    environment:
      MODE: run
    volumes:
      - ./.cache:/app/.cache
    expose:
      - "2718"
    restart: unless-stopped
