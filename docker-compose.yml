services:

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    environment:
      DOMAIN: ${DOMAIN:-notebook.ustanova.hr}
    depends_on:
      marimo:
        condition: service_healthy
      authelia:
        condition: service_started
    restart: unless-stopped

  authelia:
    image: authelia/authelia:4
    volumes:
      - ./docker/authelia:/config
    env_file:
      - .env.docker
    environment:
      TZ: Europe/Zagreb
      DOMAIN: ${DOMAIN:-notebook.ustanova.hr}
    restart: unless-stopped

  marimo:
    build: .
    env_file:
      - .env
    environment:
      MODE: run
    volumes:
      - ./.cache:/app/.cache
    expose:
      - "2718"
    mem_limit: 1g
    restart: unless-stopped
