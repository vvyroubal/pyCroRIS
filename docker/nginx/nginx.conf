events {
    worker_connections 1024;
}

http {
    # WebSocket upgrade mapa
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name notebook.ustanova.hr;  # <-- zamijeniti s pravim domenom

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Authelia verify — interni poziv za provjeru sesije
        location = /_auth_verify {
            internal;
            proxy_pass              http://authelia:9091/api/authz/forward-auth;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length      "";
            proxy_set_header        X-Forwarded-Method  $request_method;
            proxy_set_header        X-Forwarded-Proto   $scheme;
            proxy_set_header        X-Forwarded-Host    $http_host;
            proxy_set_header        X-Forwarded-URI     $request_uri;
            proxy_set_header        X-Forwarded-For     $proxy_add_x_forwarded_for;
        }

        # Authelia portal — login stranica (/auth/ se odstranjuje pri prosljeđivanju)
        location ^~ /auth/ {
            proxy_pass         http://authelia:9091/;
            proxy_redirect     / /auth/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Marimo bilježnica — zaštićena Authelia autentifikacijom
        location / {
            auth_request     /_auth_verify;
            auth_request_set $redirect_url $scheme://$http_host$request_uri;
            error_page       401 =302 /auth/?rd=$redirect_url;

            proxy_pass         http://marimo:2718;

            # WebSocket podrška (obavezno za Marimo)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;
        }
    }
}
