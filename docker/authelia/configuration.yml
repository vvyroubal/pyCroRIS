theme: light

server:
  address: 'tcp://0.0.0.0:9091/'

log:
  level: info
  format: text

# --- Autentifikacija putem Active Directory ---
authentication_backend:
  ldap:
    address: 'ldaps://ad.ustanova.hr:636'   # <-- zamijeniti
    implementation: activedirectory
    tls:
      skip_verify: false                    # true samo za testiranje sa self-signed AD certifikatom
    base_dn: 'DC=ustanova,DC=hr'            # <-- zamijeniti
    additional_users_dn: 'CN=Users'         # <-- prilagoditi strukturi AD-a
    users_filter: >-
      (&({username_attribute}={input})
        (objectClass=person)
        (!(userAccountControl:1.2.840.113556.1.4.803:=2)))
    additional_groups_dn: 'CN=Users'        # <-- prilagoditi strukturi AD-a
    groups_filter: '(&(member={dn})(objectClass=group))'
    attributes:
      group_name: cn
      mail: mail
      display_name: displayName
    user: 'CN=svc-croris,CN=Users,DC=ustanova,DC=hr'  # <-- service account DN
    password: '${AUTHELIA_LDAP_PASSWORD}'

# --- Sesije i kolačići ---
session:
  secret: '${AUTHELIA_SESSION_SECRET}'
  name: 'croris_session'
  expiration: '8h'
  inactivity: '2h'
  cookies:
    - domain: 'notebook.ustanova.hr'        # <-- zamijeniti
      authelia_url: 'https://notebook.ustanova.hr/auth/'
      default_redirection_url: 'https://notebook.ustanova.hr/'

# --- Pohrana sesija (SQLite; za produkciju razmotriti PostgreSQL/MySQL) ---
storage:
  encryption_key: '${AUTHELIA_STORAGE_ENCRYPTION_KEY}'
  local:
    path: '/config/db.sqlite3'

# --- Kontrola pristupa ---
access_control:
  default_policy: one_factor   # prijava korisničkim imenom i lozinkom

# --- Notifikacije (za reset lozinke; filesystem = zapis u datoteku) ---
notifier:
  disable_startup_check: true
  filesystem:
    filename: '/config/notifications.txt'

# --- JWT za reset lozinke ---
identity_validation:
  reset_password:
    jwt_secret: '${AUTHELIA_JWT_SECRET}'
